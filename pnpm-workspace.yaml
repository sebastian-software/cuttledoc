packages:
  - "packages/*"

# Keep optional tooling peers on the same Node API surface as the workspace.
overrides:
  "@types/node": 22.20.1

allowBuilds:
  esbuild: true
  node-llama-cpp: true

# These exact versions were audited and merged immediately before the pnpm 11
# migration. Keep the default 24-hour maturity policy for every future release.
minimumReleaseAgeExclude:
  - "caniuse-lite@1.0.30001806"
  - "ardo@4.2.0"
  - "vite@8.1.5"
