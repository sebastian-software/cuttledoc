codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        # Gate regressions against the base commit instead of an unattained
        # absolute target that would fail every pull request.
        target: auto
        threshold: 0%
    patch:
      default:
        target: 80%

comment:
  layout: "reach,diff,flags,tree,reach"
  behavior: default
  require_changes: false

ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/dist/**"
  - "**/build/**"
  - "**/node_modules/**"
  - "**/coverage/**"
