name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build docs
        run: pnpm --filter @cuttledoc/docs build
        env:
          BASE_PATH: /cuttledoc/

      - name: Prepare deployment
        run: |
          # React Router 8 writes the SPA fallback to the client root; preserve it before moving prerendered pages
          cp packages/docs/build/client/index.html packages/docs/build/client/404.html
          # React Router prerenders to basename subfolder, move to root for GitHub Pages
          cp -r packages/docs/build/client/cuttledoc/. packages/docs/build/client/
          rm -rf packages/docs/build/client/cuttledoc

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: packages/docs/build/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
