name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver increment or exact version (for example, patch or 1.2.0)
        required: true
        default: patch
        type: string
      dry_run:
        description: Validate the release without publishing, tagging, or pushing
        required: true
        default: true
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  dry-run:
    if: ${{ inputs.dry_run }}
    name: Release dry run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install the release npm CLI
        run: npm install --global npm@11.14.0
      - run: pnpm install --frozen-lockfile
      - name: Validate version input
        run: |
          node --input-type=module -e '
            const value = process.env.RELEASE_VERSION;
            const increment = /^(?:patch|minor|major|prepatch|preminor|premajor|prerelease)$/;
            const exact = /^(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$/;
            if (!increment.test(value) && !exact.test(value)) {
              console.error(`Invalid release version: ${value}`);
              process.exit(1);
            }
          '
      - name: Dry run
        run: pnpm release:dry "$RELEASE_VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: ${{ !inputs.dry_run }}
    name: Release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install an OIDC-capable npm CLI
        run: npm install --global npm@11.14.0
      - run: pnpm install --frozen-lockfile
      - name: Configure the release commit author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Validate version input
        run: |
          node --input-type=module -e '
            const value = process.env.RELEASE_VERSION;
            const increment = /^(?:patch|minor|major|prepatch|preminor|premajor|prerelease)$/;
            const exact = /^(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$/;
            if (!increment.test(value) && !exact.test(value)) {
              console.error(`Invalid release version: ${value}`);
              process.exit(1);
            }
          '
      - name: Verify published runtime dependencies
        run: |
          node --input-type=module -e '
            import { readFile } from "node:fs/promises";
            import { execFileSync } from "node:child_process";

            const manifest = JSON.parse(await readFile("packages/cuttledoc/package.json", "utf8"));
            for (const name of ["@cuttledoc/ffmpeg", "@cuttledoc/llm"]) {
              const localManifest = JSON.parse(
                await readFile(`packages/${name.split("/")[1]}/package.json`, "utf8"),
              );
              execFileSync("npm", ["view", `${name}@${localManifest.version}`, "version"], {
                stdio: "inherit",
              });
              if (!manifest.dependencies[name]?.startsWith("workspace:")) {
                throw new Error(`${name} is no longer declared as a workspace dependency`);
              }
            }
          '
      - name: Publish release
        run: pnpm release:auto "$RELEASE_VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
