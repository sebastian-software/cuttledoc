# Managed by Alfred/OpenClaw for sebastian-software.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"
    # Keep type declarations aligned with the oldest supported Node.js major,
    # and defer TypeScript 7 until typescript-eslint supports it.
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "npm"
    directory: "/packages/cuttledoc"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "npm"
    directory: "/packages/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "npm"
    directory: "/packages/ffmpeg"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "npm"
    directory: "/packages/llm"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
